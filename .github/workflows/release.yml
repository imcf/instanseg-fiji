name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build InstanSeg.zip
        run: |
          mkdir InstanSeg
          cp run_instanseg_fiji.py \
             _instanseg_runner.py \
             pixi.toml \
             pixi.lock \
             install.bat \
             install.sh \
             README.md \
             InstanSeg/
          zip -r InstanSeg.zip InstanSeg/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: InstanSeg.zip
          generate_release_notes: true
