name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build InstanSeg.zip
        run: |
          mkdir InstanSeg
          cp Run_Instanseg_Fiji.py \
             _instanseg_runner.py \
             pixi.toml \
             pixi.lock \
             README.md \
             InstanSeg/
          zip -r InstanSeg.zip InstanSeg/

      - name: Extract changelog for this version
        id: changelog
        run: |
          body=$(awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: InstanSeg.zip
          body: ${{ steps.changelog.outputs.body }}
